<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гончарная мастерская</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">

            <div class="logo">
                logo
            </div>
            <nav class="menu">
                <a href="#">О нас</a>
                <a href="#">Услуги</a>
                <a href="#">Мероприятия</a>
                <a href="#">Отзывы</a>
                <a href="#">Контакты</a>
            </nav>
            <div class="action">
            <button class="btm">Записаться</button>
            <button class="icon_btm">🛒</button>
            <button class="icon_btm">👤</button> 
            </div>
        </div>
    </header>
    <section class="banner">
        <div class="slider">
            <button class="left click">&#8592;</button>
            <img src="путь к фотке" alt="баннер">
            <button class="right click">&#8594;</button>
        </div>
    </section>
    <section class="o_nas">
        <div class="container">
            <div class="text">
                <h2>Наша гончарная мастерская</h2>
                <h3>Мы проводим занятия:</h3>
                <p>Это творческое пространство, где каждый может познакомиться с искусством работы с глиной.</p>
                <ul>
                    <li>Для детей и взрослых</li>
                    <li>Мастер-классы для начинающих и опытных</li>
                    <li>Создаём уникальные изделия ручной работы</li>
                </ul>
            </div>
            <div class="img_o_nas">
                <img src="img_o_nas" alt="фото о нас">
            </div>
        </div>
    </section>    
</body>
</html>
