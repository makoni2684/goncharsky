<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход / Регистрация</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-form { background: #1e1e1e; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 320px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #333; border-radius: 6px; background: #252525; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-reg { background: #3ecf8e; color: white; }
        .btn-reg:hover { background: #34b27b; }
        .btn-login { background: transparent; color: #3ecf8e; border: 1px solid #3ecf8e; }
    </style>
</head>
<body>
    <div class="auth-form">
        <h2>Мастерская</h2>
        <input type="email" id="email" placeholder="Ваш Email">
        <input type="password" id="password" placeholder="Пароль">
        <button class="btn-reg" onclick="signUp()">Зарегистрироваться</button>
        <button class="btn-login" onclick="signIn()">Уже есть аккаунт? Войти</button>
    </div>

    <script>
        // Ваши данные из Settings -> API
        const SB_URL = 'https://regfbsagtfysugdqtazq.supabase.co';
        const SB_KEY = 'sb_publishable_kDWSt0z2z19cWzYumbQSNA_1MoeYzV7';

        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        async function signUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await _supabase.auth.signUp({ email, password });
            if (error) alert('Ошибка: ' + error.message);
            else alert('Регистрация успешна! Теперь вы можете войти.');
        }

        async function signIn() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
            if (error) alert('Ошибка: ' + error.message);
            else {
                alert('С возвращением!');
                window.location.href = 'index.html'; // Перекидываем на главную
            }
        }
    </script>
</body>
</html>
